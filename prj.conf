# Console output via RTT (more reliable for Nordic chips)
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Also enable UART as backup
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=n

# Hardware drivers
CONFIG_GPIO=y
CONFIG_PWM=y

# Debugging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_EARLY_CONSOLE=y
