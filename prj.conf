# =============================================================================
# KLAVIATOR - Stepper Motor, Solenoids and KDAA Dashboard Config
# Target: nRF54L20 (nrf54lm20dk / nrf54l20pdk)
# =============================================================================

# GPIO - required for STEP/DIR/ENABLE pins and LEDs
CONFIG_GPIO=y

# I2C - required for PCA9685
CONFIG_I2C=y

# UART / console for KDAA Dashboard and debugging
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Kernel settings
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Logging disabled - using printk directly for deterministic speed
CONFIG_LOG=n

# Debug
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_DEBUG_INFO=y
