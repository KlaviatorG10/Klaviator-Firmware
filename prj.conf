# =============================================================================
# KLAVIATOR - DM860E Stepper Motor Driver Configuration
# Target: nRF54L15 (nrf54l15dk/nrf54l15/cpuapp)
# =============================================================================

# GPIO - required for STEP/DIR/ENABLE pins
CONFIG_GPIO=y

# UART / console for debugging
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Kernel settings
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Logging disabled - using printk directly
CONFIG_LOG=n

# Debug
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_DEBUG_INFO=y
